name: Build Windows Installer
on:
  workflow_dispatch:      # bam nut "Run workflow" o tab Actions
  push:
    tags: ['v*']          # hoac push tag vd v1.0.0 -> tu build
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install
      - name: Build .exe
        run: npm run dist
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: task-scanner-windows
          path: dist/*.exe
